name: gen_vhost_toc

on:
  push:
    paths:
      - '**.md'

permissions:
  contents: write

jobs:
  generateTOC:
    name: gen_vhost_toc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate TOC
        uses: technote-space/toc-generator@v4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}